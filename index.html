<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME-PAGE | DRK-JU |</title>
    <link rel="stylesheet" href="styel.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        /* Top section styling */
        li {
            list-style: none;
            margin: 15px 0;
            font-size: 16px;
        }

        div > li {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-left: 3px solid #00d4ff;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-weight: 500;
        }

        div > li:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        /* Clock styling */
        #clock {
            color: #00d4ff;
            font-weight: bold;
            font-size: 18px;
            font-family: 'Courier New', monospace;
        }

        /* Date styling */
        #date {
            color: #00ff88;
            font-weight: bold;
        }

        /* Number styling */
        #number {
            color: #ff006e;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #number:hover {
            color: #ff4d7d;
            text-shadow: 0 0 10px rgba(255, 0, 110, 0.5);
        }

        /* Button styling */
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-left: 10px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: scale(0.98);
        }

        .login-icon {
            font-size: 18px;
        }

        #vpn-status {
            color: #00ff88;
            font-weight: bold;
        }

        #vpn-ip {
            color: #ffcc00;
            font-weight: bold;
        }

        /* Link styling */
        a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            position: relative;
        }

        a:hover {
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
        }

        a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #00d4ff;
            transition: width 0.3s ease;
        }

        a:hover::after {
            width: 100%;
        }

        /* Search box animations */
        #search-query {
            transition: all 0.3s ease;
        }

        #search-query:focus {
            outline: none;
            background: rgba(0, 212, 255, 0.15) !important;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
            transform: scale(1.02);
        }

        #saved-links li {
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

        .no-results {
            animation: fadeIn 0.3s ease;
            color: #a0a0a0;
            padding: 10px 0;
            text-align: center;
            font-style: italic;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .search-highlight {
            color: #00ff88;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div style="display: flex; flex-wrap: wrap; justify-content: space-between; gap: 10px; margin-bottom: 20px; align-items: center;">
        <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
            <button id="login-toggle-button" onclick="toggleLoginForm()" style="display: inline-flex; align-items: center; gap: 8px;">
                <span class="login-icon">🔒</span> Login
            </button>
            <button id="logout-button" onclick="logout()" style="display: none;">Logout</button>
            <div id="login-status" style="font-weight: bold; color: #00ff88;">Guest</div>
        </div>
        <div style="display: inline-flex; flex-wrap: wrap; gap: 10px; align-items: center;">
            <div><li>VPN: <span id="vpn-status">Disabled</span></li></div>
            <div><li>IP: <span id="vpn-ip">Hidden</span></li></div>
            <button onclick="toggleVPN()" style="margin-left: 0;">Toggle VPN</button>
        </div>
    </div>

    <div id="login-panel" style="display: none; margin-bottom: 20px; padding: 20px; background: rgba(255, 255, 255, 0.05); border-radius: 8px; border: 1px solid rgba(0, 212, 255, 0.2);">
        <h3 style="color: #00d4ff; margin-bottom: 10px;">Owner Login</h3>
        <p style="margin-bottom: 15px; color: #e0e0e0;">Default login: <strong>owner</strong> / <strong>admin123</strong></p>
        <input type="text" id="login-username" placeholder="Username" style="padding: 8px; margin-right: 10px; margin-bottom: 10px; border: 1px solid #00d4ff; border-radius: 5px; background: rgba(255, 255, 255, 0.1); color: #e0e0e0;">
        <input type="password" id="login-password" placeholder="Password" style="padding: 8px; margin-right: 10px; margin-bottom: 10px; border: 1px solid #00d4ff; border-radius: 5px; background: rgba(255, 255, 255, 0.1); color: #e0e0e0;">
        <button onclick="submitLogin()" style="margin-left: 0;">Sign in</button>
    </div>

    <div id="owner-section" style="display: none; margin-bottom: 20px; padding: 20px; background: rgba(0, 255, 136, 0.08); border-radius: 8px; border: 1px solid rgba(0, 255, 136, 0.2);">
        <h3 style="color: #00ff88; margin-bottom: 10px;">Owner Access Area</h3>
        <p style="margin-bottom: 0;">Welcome back, <span id="owner-name"></span>. You have access to owner-only controls.</p>
    </div>

    <!-- top - lear -->
    <div><li>Clock: <span id="clock"></span></li></div>
    <div><li>Date: <span id="date"></span></li></div>
    <div><li>Live Track: <span id="live-track"></span> <button onclick="resetLiveTrack()" style="margin-left: 10px;">Reset Views</button></li></div>
    <div><li>Web View: <a href="https://www.youtube.com/@AMPIRESONGBD" target="_blank">YouTube Channel</a></li></div>
    <!-- end - top - lear -->

 
    <script>
        // Real-time clock
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // the hour '0' should be '12'
            hours = String(hours).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds} ${ampm}`;
        }

        // Real date
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
        }

        // Live track counter
        function updateLiveTrack() {
            const savedViews = parseInt(localStorage.getItem('liveViews') || '0', 10);
            const newViews = savedViews + 1;
            localStorage.setItem('liveViews', newViews);
            document.getElementById('live-track').textContent = `${newViews} view${newViews === 1 ? '' : 's'} (live)`;
        }

        function resetLiveTrack() {
            localStorage.setItem('liveViews', '0');
            document.getElementById('live-track').textContent = '0 views (live)';
        }

        window.addEventListener('beforeunload', resetLiveTrack);
        window.addEventListener('pagehide', resetLiveTrack);

        // Login and icon handling
        const defaultCredentials = { username: 'owner', password: 'admin123' };
        const loginData = JSON.parse(localStorage.getItem('loginData') || '{"loggedIn":false,"username":"Guest"}');

        function updateLoginUI() {
            const loginToggleButton = document.getElementById('login-toggle-button');
            const logoutButton = document.getElementById('logout-button');
            const loginStatus = document.getElementById('login-status');
            const ownerSection = document.getElementById('owner-section');
            const ownerName = document.getElementById('owner-name');

            if (loginData.loggedIn) {
                loginStatus.textContent = `Owner: ${loginData.username}`;
                ownerName.textContent = loginData.username;
                ownerSection.style.display = 'block';
                logoutButton.style.display = 'inline-flex';
                loginToggleButton.style.display = 'none';
                document.getElementById('login-panel').style.display = 'none';
            } else {
                loginStatus.textContent = 'Guest';
                ownerSection.style.display = 'none';
                logoutButton.style.display = 'none';
                loginToggleButton.style.display = 'inline-flex';
            }
        }

        function toggleLoginForm() {
            const loginPanel = document.getElementById('login-panel');
            loginPanel.style.display = loginPanel.style.display === 'block' ? 'none' : 'block';
        }

        function submitLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            if (!username || !password) {
                alert('Please enter both username and password.');
                return;
            }

            if (username === defaultCredentials.username && password === defaultCredentials.password) {
                loginData.loggedIn = true;
                loginData.username = username;
                localStorage.setItem('loginData', JSON.stringify(loginData));
                alert(`Logged in successfully as ${loginData.username}`);
                updateLoginUI();
            } else {
                alert('Incorrect username or password.');
            }
        }

        function logout() {
            loginData.loggedIn = false;
            localStorage.setItem('loginData', JSON.stringify(loginData));
            alert('Logged out successfully.');
            updateLoginUI();
        }

        // VPN-style fake IP display
        function generateFakeIp() {
            const octets = Array.from({ length: 4 }, () => Math.floor(Math.random() * 256));
            return `${octets[0]}.${octets[1]}.${octets[2]}.${octets[3]}`;
        }

        function updateVPNDisplay() {
            const vpnEnabled = localStorage.getItem('vpnEnabled') === 'true';
            document.getElementById('vpn-status').textContent = vpnEnabled ? 'Connected' : 'Disabled';
            document.getElementById('vpn-ip').textContent = vpnEnabled ? generateFakeIp() : 'Hidden';
        }

        function toggleVPN() {
            const vpnEnabled = localStorage.getItem('vpnEnabled') === 'true';
            localStorage.setItem('vpnEnabled', (!vpnEnabled).toString());
            updateVPNDisplay();
        }

        // Initialize clock and date
        updateClock();
        updateDate();
        updateLiveTrack();
        updateLoginUI();
        updateVPNDisplay();
        setInterval(updateClock, 1000); // Update clock every second

        // Auto-save links functionality
        let savedLinks = (JSON.parse(localStorage.getItem('savedLinks')) || [])
            .map(link => ({
                ...link,
                addedAt: link.addedAt || new Date().toISOString()
            }));

        function displaySavedLinks(filter = '') {
            const linksContainer = document.getElementById('saved-links');
            const query = filter.trim().toLowerCase();
            const orderedLinks = savedLinks
                .map((link, index) => ({ ...link, index }))
                .sort((a, b) => new Date(b.addedAt) - new Date(a.addedAt));

            const filteredLinks = orderedLinks.filter(link => 
                !query || link.title.toLowerCase().includes(query)
            );

            // Fade out animation
            linksContainer.style.opacity = '0';
            linksContainer.style.transition = 'opacity 0.2s ease';

            setTimeout(() => {
                linksContainer.innerHTML = '';
                linksContainer.style.opacity = '1';

                if (filteredLinks.length === 0) {
                    const noResultsLi = document.createElement('li');
                    noResultsLi.className = 'no-results';
                    noResultsLi.textContent = query ? '🔍 No links found matching "' + query + '"' : '📚 No links yet. Add one to get started!';
                    linksContainer.appendChild(noResultsLi);
                    return;
                }

                filteredLinks.forEach((link, displayIndex) => {
                    const li = document.createElement('li');
                    const addedAtText = new Date(link.addedAt).toLocaleString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    li.style.display = 'flex';
                    li.style.justifyContent = 'space-between';
                    li.style.alignItems = 'center';
                    li.style.padding = '10px 0';
                    li.style.borderBottom = '1px solid rgba(255,255,255,0.08)';
                    li.style.animation = `slideIn 0.4s ease ${displayIndex * 0.05}s both`;
                    li.innerHTML = `
                        <div style="flex: 1;">
                            <a href="${link.url}" target="_blank">${link.title || link.url}</a>
                            <div style="color: #a0a0a0; font-size: 0.9rem; margin-top: 4px;">
                                Added on ${addedAtText}
                            </div>
                        </div>
                        <button onclick="removeLink(${link.index})" style="margin-left: 15px; white-space: nowrap;">Remove</button>
                    `;
                    linksContainer.appendChild(li);
                });
            }, 150);
        }

        function addLink() {
            const urlInput = document.getElementById('link-url');
            const titleInput = document.getElementById('link-title');
            const url = urlInput.value.trim();
            const title = titleInput.value.trim() || url;
            if (url) {
                savedLinks.unshift({ url, title, addedAt: new Date().toISOString() });
                localStorage.setItem('savedLinks', JSON.stringify(savedLinks));
                displaySavedLinks(document.getElementById('search-query').value);
                urlInput.value = '';
                titleInput.value = '';
            }
        }

        function removeLink(index) {
            const password = prompt('Enter password to delete this link:');
            if (password === 'ME-1') {
                savedLinks.splice(index, 1);
                localStorage.setItem('savedLinks', JSON.stringify(savedLinks));
                displaySavedLinks(document.getElementById('search-query').value);
                alert('Link deleted successfully!');
            } else {
                alert('Incorrect password. Link not deleted.');
            }
        }

        function filterLinks() {
            const searchQuery = document.getElementById('search-query').value;
            displaySavedLinks(searchQuery);
        }

        function clearSearch() {
            const searchInput = document.getElementById('search-query');
            searchInput.value = '';
            searchInput.focus();
            displaySavedLinks();
        }

        // Real-time search on input
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('search-query');
            if (searchInput) {
                searchInput.addEventListener('input', function(e) {
                    displaySavedLinks(e.target.value);
                });
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        displaySavedLinks(e.target.value);
                    }
                });
            }
        });

        // Load saved links on page load
        displaySavedLinks();

        // Trigger real-time filter on page load
        setTimeout(() => {
            const searchInput = document.getElementById('search-query');
            if (searchInput) {
                searchInput.addEventListener('input', function(e) {
                    displaySavedLinks(e.target.value);
                });
            }
        }, 100);
    </script>
    <!-- mid - bottom layer -->

    <!-- Bottom section for adding and displaying links -->
    <div style="margin-top: 50px; padding: 20px; background: rgba(255, 255, 255, 0.05); border-radius: 8px; backdrop-filter: blur(10px);">
        <h3 style="color: #00d4ff; margin-bottom: 15px;">Add New Link</h3>
        <input type="text" id="link-url" placeholder="Enter URL (e.g., https://example.com)" style="padding: 8px; margin-right: 10px; margin-bottom: 10px; min-width: 260px; border: 1px solid #00d4ff; border-radius: 5px; background: rgba(255, 255, 255, 0.1); color: #e0e0e0;">
        <input type="text" id="link-title" placeholder="Link Title (optional)" style="padding: 8px; margin-right: 10px; margin-bottom: 10px; min-width: 220px; border: 1px solid #00d4ff; border-radius: 5px; background: rgba(255, 255, 255, 0.1); color: #e0e0e0;">
        <button onclick="addLink()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold;">Add Link</button>

        <div style="margin-top: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
            <input type="text" id="search-query" placeholder="🔍 Search links by title (real-time)" style="width: 30%; min-width: 180px; padding: 10px; border: 2px solid #00d4ff; border-radius: 5px; background: rgba(255,255,255,0.08); color: #e0e0e0; font-weight: 500;">
        </div>

        <h3 style="color: #00ff88; margin-top: 30px; margin-bottom: 15px;">Saved Links</h3>
        <ul id="saved-links" style="list-style: none; padding: 0;"></ul>
    </div>


</body>
</html>
